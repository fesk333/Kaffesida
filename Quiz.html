        <main class="bön4">
            <div class="Quiz">
                <h2>Quiz: vilket kaffe skulle du föredra?</h2>
                <form name="KaffeForm" onsubmit="return validateForm(event)" method="post">
                    <div id="kaffeQuiz">

                        <div>
                            <label for="namn" id="invisible">Förnamn</label>
                            <input type="text" name="namn" placeholder="Namn" id="namn">
                            <label for="efternamn" id="invisible">Efternamn</label>
                            <input type="text" name="efternamn" placeholder="Efternamn" id="efternamn">
                        </div>
                        <div>
                            <p>Dricker du ofta kaffe?</p>
                            <label for="inte_ofta" id="invisible">inte ofta</label>
                            <label for="ofta" id="invisible">ofta</label>
                            <input type="checkbox" name="inte_ofta" value="inte ofta" id="inte_ofta">inte ofta
                            <input type="checkbox" name="ofta" value="ofta" id="ofta">ofta
                        </div>
                        <div>
                            <label for="gillar">(Valfritt) Hur mycket gillar du kaffe? (1-100)</label>
                            <input type="range" name="gillar" min="1" max="100" id="gillar">
                        </div>
                        <div>
                            <label for="nuvarande">(Valfritt) Hur är din nuvarande kaffeupplevelse?</label>
                            <br>
                            <input type="radio" name="nuvarande" value="Väldigt dålig" id="nuvarande">Väldigt dålig
                            <input type="radio" name="nuvarande" value="Dålig" id="nuvarande">Dålig
                            <input type="radio" name="nuvarande" value="Neutral" id="nuvarande">Neutral
                            <input type="radio" name="nuvarande" value="Bra" id="nuvarande">Bra
                            <input type="radio" name="nuvarande" value="Väldigt bra" id="nuvarande">Väldigt bra
                        </div>
                        <div>

                            <label for="bittersur">Hur bittert eller surt är ditt kaffe? (1: sur, 10: bitter)</label>
                            <br>
                            <input type="number" name="bittersur" min="1" max="10" step="0.1" id="bittersur">
                        </div>
                        <div>
                            <label for="rostdatum">(Valfritt) När var dina senaste bönor rostade?</label>
                            <br>
                            <input type="date" name="rostdatum" id="rostdatum">
                        </div>
                        <div>
                            <label for="mail" id="invisible">E-postadress</label>
                            <input type="email" name="mail" placeholder="E-postadress" id="mail">
                        </div>
                        <div>
                            <label for="phone" id="invisible">Telefon</label>
                            <input type="tel" id="phone" name="phone" placeholder="Telefonnummer">
                        </div>
                        <div>                    
                            <label for="submit" id="invisible">Skicka in</label>
                            <input type="submit" value="Skicka in" id="submit">
                            <label for="reset" id="invisible">Återställ</label>
                            <input type="reset" value="Återställ" id="reset">
                        </div>

                    </div>
                </form>
            </div>
